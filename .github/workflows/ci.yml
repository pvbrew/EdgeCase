name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-macos:
    name: macOS (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # The image's default Xcode (26.4.1 at the time of writing) —
          # current stable Swift.
          - name: Xcode 26
            os: macos-26
          # The oldest toolchain the package supports (swift-tools 6.0).
          - name: Xcode 16.4
            os: macos-15
            xcode: "16.4"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        if: matrix.xcode != ''
        run: sudo xcode-select -s "/Applications/Xcode_${{ matrix.xcode }}.app"
      - name: Show toolchain
        run: swift --version
      - name: Build
        run: swift build --build-tests
      - name: Test
        run: swift test

  test-linux:
    name: Linux (Swift ${{ matrix.swift }})
    strategy:
      fail-fast: false
      matrix:
        swift: ["6.1", "6.3"]
    runs-on: ubuntu-latest
    container: swift:${{ matrix.swift }}
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: swift --version
      - name: Test
        run: swift test

  example-app:
    name: Example app (iOS Simulator)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Run example app tests
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -oE "iPhone [0-9A-Za-z ]+" | head -1 | xargs)
          echo "Using simulator: $DEVICE"
          xcodebuild test \
            -project Examples/EdgeCaseExample/EdgeCaseExample.xcodeproj \
            -scheme EdgeCaseExample \
            -destination "platform=iOS Simulator,name=$DEVICE" \
            -skipMacroValidation

  docs:
    name: DocC
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Build documentation
        run: |
          xcodebuild docbuild \
            -scheme EdgeCase \
            -destination 'generic/platform=macOS'

  api-breakage:
    name: API breakage
    if: github.event_name == 'pull_request'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Diagnose API-breaking changes against the latest release
        run: |
          BASELINE=$(git tag --list '[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)
          case "$BASELINE" in
            ""|0.*)
              echo "No 1.x release tag yet — skipping (the semver commitment starts at 1.0.0)."
              exit 0
              ;;
          esac
          echo "Comparing against $BASELINE"
          swift package diagnose-api-breaking-changes "$BASELINE"
